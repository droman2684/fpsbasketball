name: Release

# Push a version tag (e.g. `v0.2.0`, matching package.json's "version") to
# trigger a build + publish — `npm version <patch|minor|major>` creates both
# the matching commit and tag in one step; `git push --follow-tags` sends both.
on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run dist:win:publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
